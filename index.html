<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>lWang的个人网站</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", "PingFang SC", sans-serif;
}

body {
    background: #05070d;
    color: white;
    overflow-x: hidden;
}

/* 背景 */
.bg-lines {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.line {
    position: absolute;
    width: 1px;
    height: 100%;
    background: rgba(0,150,255,0.08);
    animation: move 6s linear infinite;
}

@keyframes move {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
}

/* 导航 */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    background: rgba(10,15,25,0.6);
    backdrop-filter: blur(10px);
}

.navbar a {
    color: #ccc;
    margin-left: 15px;
    text-decoration: none;
    cursor: pointer;
}

.navbar a:hover {
    color: #4db5ff;
}

/* 首页 */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h2 {
    font-size: 40px;
}

.btn {
    margin-top: 20px;
    padding: 10px 20px;
    border: 1px solid #4db5ff;
    background: transparent;
    color: #4db5ff;
    cursor: pointer;
}

/* 页面 */
.page {
    display: none;
    padding: 120px 20px;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 12px;
    max-width: 500px;
    margin: auto;
    backdrop-filter: blur(10px);
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
}
</style>
</head>

<body>

<!-- 背景 -->
<div class="bg-lines" id="bg"></div>

<!-- 导航 -->
<div class="navbar">
    <div>lWang</div>
    <div>
        <a onclick="showPage('home')">首页</a>
        <a onclick="showPage('about')">关于我</a>
        <a onclick="showPage('social')">社交</a>
        <a onclick="showPage('login')">登录</a>
        <a onclick="showPage('links')">友情链接</a>
    </div>
</div>

<!-- 首页 -->
<section id="home" class="hero page" style="display:block;">
    <h2>lWang的个人网站</h2>
    <p>一个爱玩的普通初中生</p>
    <button class="btn" onclick="showPage('about')">
开始体验
</button>
</section>

<!-- 关于我 -->
<section id="about" class="page">
    <div class="card">
        <h2>关于我</h2>
        <p>年龄：14</p>
        <p>兴趣：数码 / 科技</p>
        <p>未来：前端开发</p>
        <p>简介：一个爱玩的普通初中生。</p>
    </div>
</section>

<!-- 社交 -->
<section id="social" class="page">
    <div class="card">
        <h2>社交账号</h2>
        <button class="btn" onclick="window.open('https://v.douyin.com/_dOWWIj_k_E/')">抖音</button>
        <button class="btn" onclick="window.open('https://b23.tv/O92lbQV')">B站</button>
        <button class="btn" onclick="window.open('https://v.kuaishou.com/KsU8Hfy1')">快手</button>
    </div>
</section>

<!-- 登录 -->
<section id="login" class="page">
    <div class="card">
        <h2>登录 / 注册</h2>
        <input id="user" placeholder="用户名"/>
        <input id="pass" type="password" placeholder="密码"/>
        <input id="email" placeholder="邮箱"/>
        <select id="gender">
            <option value="">性别（可选）</option>
            <option value="boy">男</option>
            <option value="girl">女</option>
        </select>
        <button class="btn" onclick="register()">注册</button>
        <p style="font-size:12px;color:#888;">不注册也可使用</p>
    </div>
</section>

<!-- 友情链接 -->
<section id="links" class="page">
    <div class="card">
        <h2>友情链接</h2>
        <p><a href="https://github.com" target="_blank">GitHub</a></p>
        <p><a href="https://www.bilibili.com" target="_blank">Bilibili</a></p>
        <p><a href="https://chatgpt.com" target="_blank">ChatGPT</a></p>
    </div>
</section>

<script>
// 背景线条
const bg = document.getElementById("bg");
for(let i=0;i<30;i++){
    let l = document.createElement("div");
    l.className = "line";
    l.style.left = Math.random()*100 + "%";
    l.style.animationDuration = (3+Math.random()*5)+"s";
    bg.appendChild(l);
}

// 页面切换
function showPage(id){
    document.querySelectorAll(".page").forEach(p=>{
        p.style.display = "none";
    });
    document.getElementById(id).style.display = "block";
}

// 注册模拟
function register(){
    let user = document.getElementById("user").value;
    let gender = document.getElementById("gender").value;

    let avatar =
        gender === "boy" ? "🟦" :
        gender === "girl" ? "🟥" : "⬜";

    localStorage.setItem("user", user);
    localStorage.setItem("avatar", avatar);

    alert("注册成功：" + user);
}
</script>

</body>
</html>
